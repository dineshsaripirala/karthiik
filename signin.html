<!-- SIGN IN -->
<div class="auth-page">
  <div class="auth-card" data-aos="fade-up">
    <a href="index.html" style="display:block;margin-bottom:24px;"><img src="images/stackly-logo.webp" alt="Stackly" class="nav-logo-img"></a>
    <h2>Welcome Back</h2>
    <p>Sign in to access your Stackly healthcare dashboard</p>

    <div id="si-error" class="auth-error"></div>

    <div style="margin-bottom:20px;">
      <label style="font-size:0.8rem;font-weight:600;color:var(--text);display:block;margin-bottom:8px;">Select Role</label>
      <div class="role-select">
        <div class="role-btn active" id="role-patient" onclick="selectRole('patient')"><span class="icon">🏥</span><span>Patient</span></div>
        <div class="role-btn" id="role-provider" onclick="selectRole('provider')"><span class="icon">👨‍⚕️</span><span>Healthcare Provider</span></div>
      </div>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="si-email" placeholder="your@email.com" onkeydown="if(event.key==='Enter')doSignIn()">
    </div>
    <div class="form-group">
      <label>Password <span style="font-size:0.75rem;color:var(--text-light);font-weight:400;">(min 6 characters)</span></label>
      <div class="pw-wrap">
        <input type="password" id="si-pw" placeholder="Enter your password" onkeydown="if(event.key==='Enter')doSignIn()">
        <button class="pw-toggle" onclick="togglePw('si-pw',this)" type="button">👁</button>
      </div>
    </div>
    <div class="remember-row">
     <!-- <label><input type="checkbox"> Remember Me</label> -->
      <a href="404.html">Forgot Password?</a>
    </div>
    <button class="btn btn-primary" style="width:100%;" onclick="doSignIn()">Sign In →</button>
    <div class="auth-footer">Don't have an account? <a href="register.html">Create Account</a></div>

    <!-- <div style="margin-top:24px;padding:16px;background:var(--primary-light);border-radius:10px;font-size:0.8rem;color:var(--text-light);">

      Patient: patient@stackly.health / patient123<br>
      Doctor: doctor@stackly.health / doctor123
